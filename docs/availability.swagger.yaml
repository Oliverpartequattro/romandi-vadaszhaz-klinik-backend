openapi: 3.0.0
info:
  title: Romándi Vadászház Klinik - Orvosi Elérhetőség API
  version: "1.2.0"
  description: |
    Ez a modul az orvosok heti rendelési idejének kezeléséért felel. 
    Segítségével beállítható, hogy az orvos mely napokon, mettől meddig fogad pácienseket, 
    és milyen hosszú egy alapértelmezett vizsgálat (slotDuration).
    
    **Fontos szabályok:**
    - Egy orvosnak egy adott napra (pl. Hétfő) csak **egy** bejegyzése lehet (Unique Index).
    - Az időpontokat `HH:mm` formátumban kell megadni.
    - A napok neveit a rendszer automatikusan magyarosítja (pl. "MONDAY" -> "Hétfő").
tags:
  - name: Availability
    description: Orvosi rendelési idők kezelése (Létrehozás, Lekérés, Törlés)

paths:
  /api/availability:
    post:
      tags: [Availability]
      summary: Új rendelési idő rögzítése
      description: |
        Csak **DOCTOR** vagy **ADMIN** szerepkörrel hívható.
        Létrehoz egy idősávot az orvos számára. A rendszer ellenőrzi, hogy ne legyen duplikáció az adott napra.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityCreate'
      responses:
        '201':
          description: Rendelési idő sikeresen létrehozva.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: '#/components/schemas/AvailabilityResponse' }
        '400':
          description: Validációs hiba.
        '403':
          description: Nincs jogosultság.

  /api/availability/my:
    get:
      tags: [Availability]
      summary: Saját rendelési idők lekérése
      description: Visszaadja a bejelentkezett orvos összes rögzített rendelési napját.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sikeres lekérdezés.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer, example: 1 }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilityResponse'

  /api/availability/doctor/{doctorId}:
    get:
      tags: [Availability]
      summary: Egy konkrét orvos rendelési idejének lekérése ID alapján
      description: |
        Lekéri az adott orvoshoz (User ID) tartozó összes elérhetőségi bejegyzést.
        Ez a végpont általában publikus, hogy a páciensek láthassák a szabad sávokat.
      parameters:
        - in: path
          name: doctorId
          required: true
          schema:
            type: string
          description: Az orvos (User) egyedi azonosítója.
      responses:
        '200':
          description: Sikeres lekérdezés.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer, example: 2 }
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AvailabilityResponse'
        '404':
          description: Az orvoshoz nem tartoznak rögzített időpontok.

  /api/availability/{id}:
    delete:
      tags: [Availability]
      summary: Rendelési idő törlése
      description: |
        Töröl egy konkrét napot az azonosító alapján. 
        Orvos csak a sajátját, Admin bármelyiket törölheti. 
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Az availability dokumentum egyedi azonosítója.
      responses:
        '200':
          description: Sikeres törlés.
        '403':
          description: Nincs jogosultság.
        '404':
          description: Nem található.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AvailabilityCreate:
      type: object
      required: [dayOfWeek, startTime, endTime]
      properties:
        dayOfWeek:
          type: string
          description: A hét napja.
          enum: [Hétfő, Kedd, Szerda, Csütörtök, Péntek, Szombat, Vasárnap, MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
          example: "Kedd"
        startTime:
          type: string
          pattern: '^([01]\d|2[0-3]):?([0-5]\d)$'
          description: Kezdési idő HH:mm formátumban.
          example: "09:00"
        endTime:
          type: string
          pattern: '^([01]\d|2[0-3]):?([0-5]\d)$'
          description: Befejezési idő HH:mm formátumban.
          example: "17:00"
        slotDuration:
          type: integer
          minimum: 10
          default: 30
          description: Egy vizsgálat hossza percekben.
          example: 20

    AvailabilityResponse:
      type: object
      properties:
        _id: { type: string, example: "65d9c8e7f123abc456789012" }
        doctor: { type: string, example: "65d9c123f123abc456789abc" }
        dayOfWeek: { type: string, example: "Hétfő" }
        startTime: { type: string, example: "08:00" }
        endTime: { type: string, example: "16:00" }
        slotDuration: { type: integer, example: 30 }
        isActive: { type: boolean, example: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Hibaüzenet leírása" }