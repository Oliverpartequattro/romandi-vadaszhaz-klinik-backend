paths:
  /api/records:
    post:
      summary: Új ellátási lelet rögzítése (Csak Orvos vagy Admin)
      tags: [Records]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient, service_id, description]
              properties:
                patient:
                  type: string
                  description: A páciens MongoDB ID-ja.
                  example: "65a456ghi789jkl012345678"
                appointment_id:
                  type: string
                  description: Az időpont ID-ja, amihez a lelet tartozik.
                  example: "65c123abc456def789012345"
                service_id:
                  type: string
                  example: "65c456def..."
                description:
                  type: string
                  description: Orvosi vélemény, diagnózis.
                  example: "Kontroll vizsgálat, panaszmentes."
      responses:
        201:
          description: Lelet sikeresen létrehozva és hozzáfűzve a páciens adataihoz.
        403:
          description: Nincs jogosultság (Csak orvosok/adminok rögzíthetnek).
        404:
          description: A páciens nem található.

  /api/records/patient/{patientId}:
    get:
      summary: Egy adott páciens összes rekordja (Kórtörténet)
      description: Orvos/Admin bárkit lekérhet, a Páciens csak a sajátját.
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      responses:
        200:
          description: A páciens kórtörténete
        403:
          description: Nincs jogosultság más adatainak megtekintéséhez

  /api/records/my:
    get:
      summary: Bejelentkezett felhasználó saját leleteinek lekérése
      description: |
        A token alapján szűri a leleteket:
        - **Páciens**: Az összes orvosi leletét megkapja (kórtörténet).
        - **Orvos**: Az összes olyan leletet megkapja, amit ő rögzített a páciensekről.
      tags: [Records]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sikeres lekérdezés.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordResponse'
              example:
                - _id: "65d1234567890abcdef12345"
                  description: "A páciensnél enyhe vérnyomás emelkedés tapasztalható. Pihenés javasolt."
                  createdAt: "2026-02-13T10:00:00.000Z"
                  patient:
                    _id: "65a456ghi789jkl012345678"
                    name: "Kovács Béla"
                    tajNumber: "123 456 789"
                  doctor:
                    _id: "65b987def654abc321098765"
                    name: "Dr. Romándi Antal"
                    specialization: "Kardiológus"
                  service_id:
                    topic: "Kardiológiai szakvizsgálat"
                    location: "A épület, 102. ajtó"
        401:
          description: Nincs érvényes token (Nincs bejelentkezve).
        500:
          description: Szerveroldali hiba.

components:
  schemas:
    Record:
      type: object
      required:
        - patient
        - description
      properties:
        _id:
          type: string
          example: 65c8e1234567890123456789
        patient:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/User"
          description: A páciens ID-ja vagy a populált adatai
        doctor:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/User"
          description: Az orvos ID-ja vagy a populált adatai
        service:
          type: string
          description: A szolgáltatás ID-ja
        description:
          type: string
          example: "A páciens erős fejfájásra panaszkodott. Vérnyomás rendben."
        createdAt:
          type: string
          format: date-time