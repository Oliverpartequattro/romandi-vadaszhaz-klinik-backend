openapi: 3.0.0
info:
  title: Records API
  version: "1.0.0"
  description: >-
    Orvosi dokumentációk (rekordok) kezelése: új leletek létrehozása és páciensek
    előzményeinek lekérdezése. Példák magyar nyelvűek.
tags:
  - name: Records
    description: Manage patient medical records
paths:
  /api/records:
    get:
      tags: [Records]
      summary: Get all records (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of records (populated)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin only
    post:
      tags: [Records]
      summary: Create a new record (Doctor or Admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordCreate'
            example:
              patient: "65a456ghi789jkl012345678"
              appointment_id: "65c123abc456def789012345"
              service: "65c456def..."
              description: "Kontroll vizsgálat - panaszmentes, javasolt kontroll 6 hónap múlva."
      responses:
        '201':
          description: Created record (populated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordResponse'
              example:
                _id: "6b7c8d9e0f1a2b3c4d5e6f70"
                patient:
                  _id: "65a456ghi789jkl012345678"
                  name: "Kovács Béla"
                  tajNumber: "123456789"
                doctor:
                  _id: "698a3e705cf74c640c1f4b1c"
                  name: "Dr. Romándi Antal"
                  specialization: "Kardiológia"
                appointment_id: "65c123abc456def789012345"
                service:
                  _id: "5f8d0d55b54764421b7156c1"
                  topic: "Szív ultrahang"
                  location: "102-es vizsgáló"
                  price: "25000 Ft"
                description: "Kontroll vizsgálat - panaszmentes, javasolt kontroll 6 hónap múlva."
                createdAt: "2026-03-15T10:30:00.000Z"
        '400':
          description: Validation error
        '403':
          description: Only doctors or admins may create records
  /api/records/patient/{patientId}:
    get:
      tags: [Records]
      summary: Get all records for a patient
      description: Doctors and Admins may view any patient; a patient may view only their own history.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Patient records array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordResponse'
        '403':
          description: Forbidden (no access to other's records)
        '404':
          description: Patient not found
  /api/records/my:
    get:
      tags: [Records]
      summary: Get own records (patient or doctor)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of records relevant to the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecordResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    RecordCreate:
      type: object
      required: [patient, description, service]
      properties:
        patient:
          type: string
          description: Patient MongoDB ID
        appointment_id:
          type: string
          description: Optional appointment ID to link the record
        service:
          type: string
          description: Service ID
        description:
          type: string
    RecordResponse:
      type: object
      properties:
        _id: { type: string }
        patient:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            tajNumber: { type: string }
        doctor:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
        appointment_id: { type: string }
        service:
          type: object
          properties:
            _id: { type: string }
            topic: { type: string }
            location: { type: string }
            price: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        message: { type: string }
        error: { type: string }