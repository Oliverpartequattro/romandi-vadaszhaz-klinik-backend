openapi: 3.0.0
info:
  title: Services API
  version: "1.0.0"
  description: >-
    Orvosi szolgáltatások (eljárások, vizsgálatok, események) kezelése a Klinika
    rendszerében. A dokumentáció minden példája magyar nyelvű és a frontend
    könnyebb integrációját szolgálja.
tags:
  - name: Services
    description: CRUD for services (create/list and doctor-specific lists)
paths:
  /api/services:
    get:
      tags: [Services]
      summary: List all services
      responses:
        '200':
          description: Array of service entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceResponse'
              example:
                - _id: "65c1234567890abc11111111"
                  doctor_id: "698a3e705cf74c640c1f4b1c"
                  topic: "Kardiológia"
                  description: "Szívultrahangos alapvizsgálat"
                  location: "204-es vizsgáló"
                  date: "2026-05-20T10:00:00.000Z"
                  price: "25000 Ft"
                  patient_id: null
                  created_by: "698a3e705cf74c640c1f4b1c"
                - _id: "65c1234567890abc22222222"
                  doctor_id: "698a3e705cf74c640c1f4b1c"
                  topic: "Kisműtét"
                  description: "Katéterezés"
                  location: "Műtő 1"
                  date: "2026-05-21T08:30:00.000Z"
                  price: "1 lélek"
                  patient_id: null
                  created_by: "698a3e705cf74c640c1f4b1c"

    post:
      tags: [Services]
      summary: Create a new service (Doctor for own, Admin for any)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
            example:
              doctor_id: "698a3e705cf74c640c1f4b1c"
              topic: "Kardiológia"
              description: "30 perces konzultáció + EKG"
              location: "102-es vizsgáló"
              date: "2026-05-20T10:00:00.000Z"
              price: "25000 Ft"
      responses:
        '201':
          description: Created service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
              example:
                _id: "65c1234567890abc11111111"
                doctor_id: "698a3e705cf74c640c1f4b1c"
                topic: "Kardiológia"
                description: "30 perces konzultáció + EKG"
                location: "102-es vizsgáló"
                date: "2026-05-20T10:00:00.000Z"
                price: "25000 Ft"
                patient_id: null
                created_by: "698a3e705cf74c640c1f4b1c"
        '400':
          description: Validation error
        '403':
          description: Forbidden (doctor creating for different doctor)
  /api/services/{doctorId}:
    get:
      tags: [Services]
      summary: Get services for a specific doctor
      parameters:
        - in: path
          name: doctorId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Services for the given doctor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceResponse'
        '404':
          description: No services found for that doctor
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ServiceCreateRequest:
      type: object
      required: [doctor_id, topic, description, location, date, price]
      properties:
        doctor_id: { type: string }
        topic: { type: string }
        description: { type: string }
        location: { type: string }
        date: { type: string, format: date-time }
        price: { type: string }
        patient_id: { type: string, nullable: true }
    ServiceResponse:
      type: object
      properties:
        _id: { type: string }
        doctor_id: { type: string }
        topic: { type: string }
        description: { type: string }
        location: { type: string }
        date: { type: string, format: date-time }
        price: { type: string }
        patient_id: { type: string, nullable: true }
        created_by: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        message: { type: string }
        error: { type: string }