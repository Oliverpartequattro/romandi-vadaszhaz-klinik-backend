openapi: 3.0.0
info:
  title: Romándi Vadászház Klinik - Időpontkezelő API
  version: "1.1.0"
  description: |
    Ez az API modul felelős az időpontfoglalások teljes életciklusának kezeléséért.
    Tartalmazza az elérhetőség ellenőrzést, a státuszkezelést és a szerepkör alapú jogosultságokat.
    
    **Szerepkörök és jogok:**
    - **PATIENT (Páciens):** Saját időpontot foglalhat, lemondhat (CANCELLED), vagy elfogadhat orvosi ajánlatot (CONFIRMED).
    - **DOCTOR (Orvos):** Saját naptárát látja, módosíthat időpontokat (státusz ekkor PROPOSED lesz), vagy visszautasíthat kéréseket.
    - **ADMIN:** Minden időpontot lát és módosíthat korlátozás nélkül.

tags:
  - name: Appointments
    description: Időpontfoglalások létrehozása, lekérdezése és módosítása

paths:
  /api/appointments:
    get:
      tags: [Appointments]
      summary: Összes klinikán lévő időpont lekérése
      description: Kizárólag Adminisztrátorok számára érhető el. Visszaadja a klinika összes foglalását időrendi sorrendben.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sikeres lekérdezés.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Nincs adminisztrátori jogosultság.

    post:
      tags: [Appointments]
      summary: Új időpontfoglalás létrehozása
      description: |
        Páciensek és orvosok is használhatják. 
        A szerver automatikusan ellenőrzi:
        1. Az orvos rendel-e az adott napon (Availability).
        2. A kért időpont beleesik-e a rendelési időbe.
        3. Nincs-e már másik foglalt időpont abban a sávban.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
            example:
              doctor_id: "65b987def654abc321098765"
              service_id: "65c456def888abc111222333"
              startTime: "2026-03-25T10:00:00.000Z"
              referral_type: "SELF"
      responses:
        '201':
          description: Időpont sikeresen rögzítve. A rendszer visszaigazoló emailt küld.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentFullResponse'
        '400':
          description: Validációs hiba (pl. múltbeli időpont, orvos nem rendel, vagy már foglalt a hely).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/appointments/my:
    get:
      tags: [Appointments]
      summary: Bejelentkezett felhasználó saját időpontjai
      description: Páciensnél a saját foglalásai, orvosnál a hozzá érkező páciensek listája jelenik meg.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A felhasználóhoz kapcsolódó időpontok listája.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentFullResponse'

  /api/appointments/{id}:
    put:
      tags: [Appointments]
      summary: Időpont módosítása vagy válaszadás
      description: |
        - Ha az **Orvos** módosítja az időpontot (startTime/endTime), a státusz automatikusan `PROPOSED` lesz.
        - A **Páciens** csak `CONFIRMED` (elfogadás) vagy `CANCELLED` (lemondás) státuszt állíthat be.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Az időpont egyedi MongoDB azonosítója
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdate'
            example:
              status: "CANCELLED"
      responses:
        '200':
          description: Sikeres frissítés.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentFullResponse'
        '403':
          description: Nincs jogosultság a módosításhoz (nem saját időpont vagy tiltott státuszátmenet).
        '404':
          description: Az időpont nem található.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  responses:
    Unauthorized:
      description: Hiányzó vagy érvénytelen token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    AppointmentCreate:
      type: object
      required: [doctor_id, service_id, startTime]
      properties:
        doctor_id: 
          type: string
          example: "65b987def654abc321098765"
        patient_id:
          type: string
          description: Csak orvosi/adminisztrátori rögzítés esetén kötelező.
          example: "65a123abc456def789012345"
        service_id:
          type: string
          example: "65c456def888abc111222333"
        startTime:
          type: string
          format: date-time
          description: ISO 8601 formátumú kezdési idő. Nem lehet a múltban.
          example: "2026-03-25T10:00:00.000Z"
        endTime:
          type: string
          format: date-time
          nullable: true
          description: Befejezés ideje. Ha üres, a backend a szolgáltatás hossza alapján számolhatja.
        referral_type:
          type: string
          enum: [SELF, DOCTOR]
          default: SELF
          description: Önmaga jelentkezett, vagy orvosi beutalóval érkezik.
        referred_by:
          type: string
          nullable: true
          description: Beutaló orvos azonosítója (ha a típus DOCTOR).

    AppointmentUpdate:
      type: object
      properties:
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED, PROPOSED, CONFIRMED, CANCELLED, COMPLETED]
          description: "Státuszváltási szabályok érvényesek!"
        service_id: { type: string }

    AppointmentFullResponse:
      type: object
      properties:
        _id: { type: string, example: "65d1234567890abcdef12345" }
        status: { type: string, example: "PENDING" }
        startTime: { type: string, format: date-time, example: "2026-03-25T10:00:00.000Z" }
        endTime: { type: string, format: date-time, example: "2026-03-25T10:30:00.000Z" }
        referral_type: { type: string, example: "SELF" }
        doctor_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string, example: "Dr. Kovács János" }
            specialization: { type: string, example: "Kardiológus" }
        patient_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string, example: "Teszt Páciens" }
            email: { type: string, example: "paciens@gmail.com" }
            phone: { type: string, example: "+36301234567" }
        service_id:
          type: object
          properties:
            _id: { type: string }
            topic: { type: string, example: "Szívultrahang vizsgálat" }
            location: { type: string, example: "1. emelet 12. ajtó" }
            price: { type: number, example: 25000 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Ez az időpont már foglalt" }
        error: { type: string, example: "ConflictError" }