openapi: 3.0.0
info:
  title: Appointments API
  version: "1.0.0"
  description: >-
    Időpontfoglalási végpontok a Klinika rendszeréhez: időpont létrehozása,
    listázás és módosítás. A példák magyar nyelvűek és a backend üzleti
    szabályait tükrözik (pl. kezdőidőnek a jövőben kell lennie).
tags:
  - name: Appointments
    description: Manage appointment bookings and responses
paths:
  /api/appointments:
    get:
      tags: [Appointments]
      summary: Get all appointments (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of appointments (populated)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentFullResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Appointments]
      summary: Create a new appointment (Patient or Doctor)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreate'
            example:
              doctor_id: "698a3e705cf74c640c1f4b1c"
              patient_id: "65c123abc456def789012345"
              service_id: "5f8d0d55b54764421b7156c1"
              startTime: "2026-03-15T09:00:00.000Z"
              endTime: "2026-03-15T09:30:00.000Z"
              referral_type: "SELF"
      responses:
        '201':
          description: Appointment created (populated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentFullResponse'
        '400':
          description: Validation error (e.g., past startTime)
  /api/appointments/my:
    get:
      tags: [Appointments]
      summary: Get appointments for the authenticated user (patient or doctor)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointments related to the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentFullResponse'
  /api/appointments/{id}:
    put:
      tags: [Appointments]
      summary: Update an appointment (doctor, patient or admin with rules)
      description: |
        Rules implemented in server logic:
        - Doctors/Admin changing start/end time cause status => PROPOSED.
        - Patients can only set CONFIRMED or CANCELLED (except Admin overrides).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentUpdate'
            example:
              startTime: "2026-03-16T10:00:00.000Z"
              status: "PROPOSED"
      responses:
        '200':
          description: Updated appointment (populated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentFullResponse'
        '403':
          description: Forbidden (not owner or forbidden transition)
        '404':
          description: Appointment not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    AppointmentCreate:
      type: object
      required: [doctor_id, service_id, startTime]
      properties:
        doctor_id: { type: string }
        patient_id:
          type: string
          description: Only required when a doctor/admin creates on behalf of a patient
        service_id: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time, nullable: true }
        referral_type:
          type: string
          enum: [SELF, DOCTOR]
        referred_by: { type: string, nullable: true }
    AppointmentUpdate:
      type: object
      properties:
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time }
        status:
          type: string
          description: "Status transitions are enforced by server logic"
          enum: [PENDING, ACCEPTED, REJECTED, PROPOSED, CONFIRMED, CANCELLED]
        service_id: { type: string }
    AppointmentFullResponse:
      type: object
      properties:
        _id: { type: string }
        status: { type: string }
        startTime: { type: string, format: date-time }
        endTime: { type: string, format: date-time, nullable: true }
        referral_type: { type: string }
        doctor_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
            phone: { type: string }
        patient_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
            phone: { type: string }
        service_id:
          type: object
          properties:
            _id: { type: string }
            topic: { type: string }
            location: { type: string }
            price: { type: string }
        referred_by:
          nullable: true
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
        created_by: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        message: { type: string }
        error: { type: string }