paths:
  /api/appointments:
    get:
      summary: Összes időpont lekérése (Admin Only)
      description: Lekéri az összes foglalást az adatbázisból, orvosi és páciens adatokkal populálva.
      tags: [Appointments]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentResponse'
        401:
          description: Nem azonosított felhasználó
        403:
          description: Nincs Admin jogosultság

    post:
      summary: Új időpont igénylése
      description: Páciens saját magának, vagy Orvos beutalóként hozhat létre PENDING státuszú foglalást.
      tags: [Appointments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doctor_id, service_id, startTime]
              properties:
                doctor_id:
                  type: string
                  example: "65c123abc..."
                service_id:
                  type: string
                  example: "65c456def..."
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                  nullable: true
                referral_type:
                  type: string
                  enum: [SELF, DOCTOR]
                referred_by:
                  type: string
                  description: Beutaló orvos ID-ja (ha van)
      responses:
        201:
          description: Foglalás sikeresen létrehozva (PENDING)
        400:
          description: Validációs hiba

  /api/appointments/{id}:
    put:
      summary: Időpont módosítása vagy válasz
      description: |
        - **Admin**: Bármit módosíthat.
        - **Orvos**: Elfogadhatja (CONFIRMED) vagy új időt javasolhat (PROPOSED).
        - **Páciens**: Elfogadhatja az orvos ajánlatát (CONFIRMED) vagy lemondhatja (CANCELLED).
      tags: [Appointments]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, CONFIRMED, PROPOSED, CANCELLED, REJECTED]
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
      responses:
        200:
          description: Sikeres frissítés
        403:
          description: Nincs jogosultság a módosításhoz vagy tiltott státuszátmenet



components:
  schemas:
    AppointmentResponse:
      type: object
      properties:
        _id:
          type: string
        doctor_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
        patient_id:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
        service_id:
          type: object
          properties:
            _id: { type: string }
            topic: { type: string }
            location: { type: string }
            price: { type: string }
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          example: "PENDING"
        referral_type:
          type: string
          example: "SELF"