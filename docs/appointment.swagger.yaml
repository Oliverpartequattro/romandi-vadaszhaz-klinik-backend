paths:
  /api/appointments:
    get:
      summary: Összes időpont lekérése (Csak Admin)
      tags: [Appointments]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Az összes rögzített időpont listája a kapcsolódó adatokkal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentResponse'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          description: Nincs admin jogosultságod
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Szerveroldali hiba az adatok lekérésekor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    AppointmentResponse:
      type: object
      properties:
        _id:
          type: string
          example: "698c5f145069be97c382db6a"
        doctor_id:
          type: object
          properties:
            _id: { type: string, example: "698a3e705cf74c640c1f4b1c" }
            name: { type: string, example: "Dr. Kovács Béla" }
            specialization: { type: string, example: "Kardiológus" }
        patient_id:
          type: object
          properties:
            _id: { type: string, example: "6989c26f47278217e6676824" }
            name: { type: string, example: "Páciens János" }
            email: { type: string, example: "janos@gmail.com" }
            phone: { type: string, example: "+36709998877" }
        service_id:
          type: object
          properties:
            _id: { type: string, example: "65c1234567890abc" }
            name: { type: string, example: "Szívultrahang" }
        startTime:
          type: string
          format: date-time
          example: "2026-02-15T09:00:00.000Z"
        endTime:
          type: string
          format: date-time
          example: "2026-02-15T09:30:00.000Z"
        status:
          type: string
          example: "BOOKED"
        referral_type:
          type: string
          enum: [SELF, DOCTOR]
          example: "DOCTOR"
        referred_by:
          nullable: true
          type: object
          properties:
            _id: { type: string, example: "698d3e705cf74c640c1f4b1d" }
            name: { type: string, example: "Dr. Háziorvos Eszter" }
            specialization: { type: string, example: "Háziorvos" }
        createdAt:
          type: string
          format: date-time
          example: "2026-02-10T11:00:00.000Z"

    Error:
      type: object
      properties:
        message: { type: string, example: "Hibaüzenet szövege" }
        error: { type: string, example: "Részletes hiba leírása (opcionális)" }