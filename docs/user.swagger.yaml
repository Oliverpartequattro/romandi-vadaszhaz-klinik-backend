openapi: 3.0.0
info:
  title: Romándi Vadászház Klinik - Felhasználók API
  version: "1.2.0"
  description: |
    Felhasználókezelés, hitelesítés és komplex Dashboard adatok kiszolgálása. 
    A rendszer három szerepkört támogat: `PATIENT`, `DOCTOR`, `ADMIN`.
tags:
  - name: Users
    description: Regisztráció, bejelentkezés és profil műveletek
  - name: Stats
    description: Személyre szabott statisztikai adatok

paths:
  /api/users/register:
    post:
      tags: [Users]
      summary: Új felhasználó regisztrálása
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Sikeres regisztráció.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'
        '400':
          description: Validációs hiba.

  /api/users/login:
    post:
      tags: [Users]
      summary: Bejelentkezés
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Sikeres bejelentkezés.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'

  /api/users/profile:
    get:
      tags: [Users]
      summary: Bejelentkezett felhasználó teljes Dashboard adatcsomagja
      description: |
        Visszaadja a felhasználó adatait, az összes leletét (időrendben), 
        az összes időpontját, a legközelebbi vizitjét és a számított statisztikákat.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Összetett Dashboard válasz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'

    put:
      tags: [Users]
      summary: Saját profil frissítése
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil sikeresen frissítve.

  /api/users/stats/me:
    get:
      tags: [Stats]
      summary: Személyre szabott statisztikák lekérése
      description: |
        Szerepkörtől függő statisztika:
        - Admin: Rendszer szintű adatok.
        - Doctor: Saját páciensek és kezelések száma.
        - Patient: Leletek száma és becsült egészségügyi befektetés.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statisztikai adatok objektuma.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  stats: { type: object }

  /api/users/doctors:
    get:
      tags: [Users]
      summary: Orvosok listája rendelési idővel
      responses:
        '200':
          description: Orvosok listája.

  /api/users/forgot-password:
    post:
      tags: [Users]
      summary: Elfelejtett jelszó kód kérése
      responses:
        '200':
          description: Kód kiküldve.

  /api/users/reset-password:
    post:
      tags: [Users]
      summary: Jelszó visszaállítása kóddal
      responses:
        '200':
          description: Sikeres módosítás.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required: [name, email, password, phone, birthDate, gender]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        phone: { type: string }
        birthDate: { type: string, format: date }
        gender: { type: string, enum: [MALE, FEMALE] }
        role: { type: string, enum: [DOCTOR, PATIENT] }
        tajNumber: { type: string }
        address: { type: string }
        specialization: { type: string }

    UserAuthResponse:
      type: object
      properties:
        success: { type: boolean }
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        token: { type: string }

    UserProfileResponse:
      type: object
      properties:
        success: { type: boolean }
        user:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
            phone: { type: string }
            tajNumber: { type: string, nullable: true }
            address: { type: string, nullable: true }
            birthDate: { type: string, format: date }
            gender: { type: string }
            role: { type: string }
            specialization: { type: string, nullable: true }
        nextAppointment: { type: object, nullable: true, description: "A legközelebbi jövőbeli ACCEPTED időpont" }
        appointments: { type: array, items: { type: object }, description: "Az összes időpont" }
        records: { type: array, items: { type: object }, description: "Az összes lelet csökkenő időrendben" }
        availabilities: { type: array, items: { type: object }, description: "Orvosok esetén a rendelési idők" }
        stats:
          type: object
          properties:
            totalVisits: { type: integer }
            activeAppointments: { type: integer }
            lastVisitDate: { type: string, format: date-time, nullable: true }
        token: { type: string }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        tajNumber: { type: string }
        birthDate: { type: string }
        gender: { type: string }
        specialization: { type: string }
        password: { type: string }

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }