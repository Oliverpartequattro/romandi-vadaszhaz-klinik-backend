paths:
  /api/users:
    get:
      summary: Összes felhasználó lekérése (Csak Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sikeres lekérdezés (minden adat)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        403:
          description: Nincs admin jogosultságod

  /api/users/doctors:
    get:
      summary: Az összes orvos lekérése (Publikus, elérhetőségekkel)
      tags: [Users]
      responses:
        200:
          description: Orvosok listája (név, szakvizsga, email, telefon)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id: { type: string }
                    name: { type: string }
                    specialization: { type: string }
                    email: { type: string }
                    phone: { type: string }

  /api/users/patients:
    get:
      summary: Az összes páciens lekérése (Csak Orvos vagy Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Páciensek listája minden adattal (TAJ, lakcím stb.)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        403:
          description: Csak orvosok vagy adminok férhetnek hozzá

  /api/users/register:
    post:
      summary: Új felhasználó regisztrálása
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: Felhasználó létrehozva
        400:
          description: Validációs hiba vagy már létező email

  /api/users/login:
    post:
      summary: Bejelentkezés
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Sikeres bejelentkezés (visszaadja a tokent és a júzert)
        401:
          description: Érvénytelen email vagy jelszó

  /api/users/profile:
    get:
      summary: Bejelentkezett felhasználó profilja
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Saját profil adatai
        401:
          description: Nincs érvényes token

  /api/users/{id}:
    delete:
      summary: Felhasználó törlése (Saját profil vagy Admin által)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Sikeres törlés
        403:
          description: Nincs jogosultságod más profilját törölni

components:
  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, DOCTOR, PATIENT] }
        specialization: { type: string, description: "Csak orvosnak" }
        tajNumber: { type: string, description: "Csak páciensnek" }
        address: { type: string, description: "Csak páciensnek" }
    
    UserRegister:
      type: object
      required: [name, email, password, phone, role]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        role: { type: string, enum: [DOCTOR, PATIENT], default: PATIENT }
        specialization: { type: string, description: "Kötelező, ha role: DOCTOR" }
        tajNumber: { type: string, description: "Kötelező, if role: PATIENT" }
        address: { type: string, description: "Kötelező, if role: PATIENT" }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        address: { type: string }
        tajNumber: { type: string }
        specialization: { type: string }