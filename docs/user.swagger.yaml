openapi: 3.0.0
info:
  title: Users API
  version: "1.0.0"
  description: >-
    Felhasználó-kezelő végpontok a Klinika rendszerhez: regisztráció, bejelentkezés,
    profilkezelés, és adminisztráció. Minden példa magyar nyelvű adatokkal van megadva
    a frontend fejlesztésének megkönnyítésére.
tags:
  - name: Users
    description: Endpoints for user registration, authentication and management
paths:
  /api/users:
    get:
      tags: [Users]
      summary: Összes felhasználó lekérése (csak ADMIN jogosultsággal)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Admin privileges required
  /api/users/doctors:
    get:
      tags: [Users]
      summary: Orvosok listája (publikus)
      responses:
        '200':
          description: Doctors list (limited fields)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id: { type: string }
                    name: { type: string }
                    specialization: { type: string }
                    email: { type: string }
                    phone: { type: string }
              example:
                - _id: "698a3e705cf74c640c1f4b1c"
                  name: "Dr. Romándi Antal"
                  specialization: "Kardiológia"
                  email: "romandi.antal@klinika.hu"
                  phone: "+36301112233"
  /api/users/patients:
    get:
      tags: [Users]
      summary: Páciensek listája (csak DOCTOR vagy ADMIN)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Patients list (safe fields)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserPatientPublic'
        '403':
          description: Only doctors or admins allowed
  /api/users/register:
    post:
      tags: [Users]
      summary: Új felhasználó regisztrációja
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
            example:
              name: "Kovács Béla"
              email: "kovacs.bela@pelda.hu"
              password: "Jelszo2026"
              phone: "+36301234567"
              birthDate: "1990-01-01"
              role: "PATIENT"
              gender: "MALE"
              tajNumber: "123456789"
              address: "1051 Budapest, Erzsébet tér 1."
      responses:
        '201':
          description: User created (returns created user + token)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserPublic'
                  - type: object
                    properties:
                      token: { type: string }
              example:
                _id: "65c123abc456def789012345"
                name: "Kovács Béla"
                email: "kovacs.bela@pelda.hu"
                phone: "+36301234567"
                role: "PATIENT"
                gender: "MALE"
                tajNumber: "123456789"
                address: "1051 Budapest, Erzsébet tér 1."
                birthDate: "1990-01-01"
                token: "eyJhbGciOiJIUzI1NiJ9.KV1f..." # rövidített példa token
        '400':
          description: Validation error or user exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/login:
    post:
      tags: [Users]
      summary: Bejelentkezés (login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
            example:
              email: "paciens@pelda.hu"
              password: "Paciens123"
      responses:
        '200':
          description: Successful login (returns user fields + token)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserPublic'
                  - type: object
                    properties:
                      token: { type: string }
                  example:
                    _id: "65c123abc456def789012345"
                    name: "Páciens Szemethy"
                    email: "paciens@pelda.hu"
                    phone: "+36203333333"
                    role: "PATIENT"
                    token: "eyJhbGciOiJIUzI1NiJ9.abc123..."
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/users/logout:
    post:
      tags: [Users]
      summary: Kijelentkezés (frontend token törlésének megerősítése)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
              example:
                message: "Sikeres kijelentkezés."
  /api/users/profile:
    get:
      tags: [Users]
      summary: Bejelentkezett felhasználó profiljának lekérése (populate rekordokkal)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile including populated records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Saját profil frissítése
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
            example:
              name: "Páciens Frissített"
              phone: "+36709998877"
              address: "9022 Győr, Új utca 5."
      responses:
        '200':
          description: Updated user with new token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/users/{id}:
    delete:
      tags: [Users]
      summary: Felhasználó törlése (admin vagy saját törlés)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "6989c26f47278217e6676824"
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  example:
                    message: "Felhasználó sikeresen törölve"
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    UserPublic:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, DOCTOR, PATIENT] }
        gender: { type: string }
        specialization: { type: string, nullable: true }
        tajNumber: { type: string, nullable: true }
        address: { type: string, nullable: true }
        birthDate: { type: string, format: date }
      description: |
        Felhasználó publikus adatai. Bizonyos mezők szenzitívek (tajNumber, address)
        — csak a megfelelő jogosultság mellett jelennek meg.
    UserPatientPublic:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        role: { type: string }
      description: Rövidített páciens nézet, csak alapadatokkal.
    UserRegister:
      type: object
      required: [name, email, password, phone]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        birthDate: { type: string, format: date }
        role: { type: string, enum: [DOCTOR, PATIENT], default: PATIENT }
        gender: { type: string, enum: [MALE, FEMALE] }
        specialization: { type: string }
        tajNumber: { type: string }
        address: { type: string }
      description: Regisztrációhoz szükséges adatok. A szerepkör befolyásolja,
        hogy mely mezők válnak kötelezővé (pl. tajNumber PATIENT esetén).
    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        address: { type: string }
        birthDate: { type: string, format: date }
        tajNumber: { type: string }
        gender: { type: string }
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/UserPublic'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/RecordPopulated'
    RecordPopulated:
      type: object
      properties:
        _id: { type: string }
        description: { type: string }
        doctor:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
        service:
          type: object
          properties:
            _id: { type: string }
            topic: { type: string }
            location: { type: string }
        createdAt: { type: string, format: date-time }
    Error:
      type: object
      properties:
        message: { type: string }
        error: { type: string }