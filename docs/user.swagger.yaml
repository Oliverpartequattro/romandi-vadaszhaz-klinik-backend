openapi: 3.0.0
info:
  title: Romándi Vadászház Klinik - Felhasználók API
  version: "1.3.0"
  description: |
    Felhasználókezelés, hitelesítés és komplex Dashboard adatok kiszolgálása. 
    A rendszer három szerepkört támogat: `PATIENT`, `DOCTOR`, `ADMIN`.
tags:
  - name: Users
    description: Regisztráció, bejelentkezés és profil műveletek
  - name: Stats
    description: Személyre szabott statisztikai adatok (Dashboard aggregáció)

paths:
  /api/users/register:
    post:
      tags: [Users]
      summary: Új felhasználó regisztrálása
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Sikeres regisztráció.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'
        '400':
          description: Validációs hiba (pl. már foglalt email).

  /api/users/login:
    post:
      tags: [Users]
      summary: Bejelentkezés
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Sikeres bejelentkezés.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'
        '401':
          description: Érvénytelen email vagy jelszó.

  /api/users/profile:
    get:
      tags: [Users]
      summary: Bejelentkezett felhasználó teljes Dashboard adatcsomagja
      description: |
        Visszaadja a felhasználó adatait, az összes leletét (időrendben), 
        az összes időpontját, a legközelebbi vizitjét és az alapvető statisztikákat.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Összetett Dashboard válasz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    put:
      tags: [Users]
      summary: Saját profil frissítése
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil sikeresen frissítve.

  /api/users/stats/me:
    get:
      tags: [Stats]
      summary: Személyre szabott részletes statisztikák
      description: |
        A bejelentkezett felhasználó szerepköre alapján eltérő mélységű adatokat ad vissza:
        - **PATIENT**: Lezárt/aktív foglalások száma + Következő vizit részletei (orvos, helyszín).
        - **DOCTOR**: Páciensek száma + Következő páciens + Legutóbbi vizit adatai.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Részletes statisztikai objektum.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  role: { type: string, enum: [PATIENT, DOCTOR, ADMIN] }
                  stats:
                    oneOf:
                      - $ref: '#/components/schemas/PatientStats'
                      - $ref: '#/components/schemas/DoctorStats'
                      - $ref: '#/components/schemas/AdminStats'

  /api/users/doctors:
    get:
      tags: [Users]
      summary: Orvosok listája rendelési idővel
      responses:
        '200':
          description: Orvosok listája a hozzájuk tartozó availabilities adatokkal.

  /api/users/forgot-password:
    post:
      tags: [Users]
      summary: Elfelejtett jelszó kód kérése (6 jegyű kód emailben)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Kód kiküldve az email címre.

  /api/users/reset-password:
    post:
      tags: [Users]
      summary: Jelszó visszaállítása a kapott kóddal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                code: { type: string }
                newPassword: { type: string }
      responses:
        '200':
          description: Jelszó sikeresen megváltoztatva.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- STATISZTIKA SÉMÁK ---
    PatientStats:
      type: object
      properties:
        type: { type: string, example: "Patient Dashboard Summary" }
        totalCompleted: { type: integer, description: "Sikeresen lezárt foglalások száma" }
        totalActive: { type: integer, description: "Jövőbeli, aktív foglalások száma" }
        healthInvestment: { type: integer, description: "Eddigi lezárt vizitek alapján számolt összeg (Ft)" }
        nextAppointment:
          type: object
          nullable: true
          properties:
            date: { type: string, format: date-time }
            doctor: { type: string }
            specialization: { type: string }
            location: { type: string }
            topic: { type: string }

    DoctorStats:
      type: object
      properties:
        type: { type: string, example: "Doctor Dashboard Summary" }
        totalPatients: { type: integer, description: "Egyedi páciensek száma" }
        totalCompleted: { type: integer, description: "Elvégzett (COMPLETED) kezelések száma" }
        totalActive: { type: integer, description: "Várható jövőbeli vizitek száma" }
        nextPatient:
          type: object
          nullable: true
          properties:
            date: { type: string, format: date-time }
            patientName: { type: string }
            topic: { type: string }
            location: { type: string }
        lastVisit:
          type: object
          nullable: true
          properties:
            date: { type: string, format: date-time }
            patientName: { type: string }
            topic: { type: string }

    AdminStats:
      type: object
      properties:
        totalUsers: { type: integer }
        appointmentsToday: { type: integer }
        type: { type: string, example: "System Overview" }

    # --- USER / AUTH SÉMÁK ---
    UserRegister:
      type: object
      required: [name, email, password, phone, birthDate, gender]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        phone: { type: string }
        birthDate: { type: string, format: date }
        gender: { type: string, enum: [MALE, FEMALE] }
        role: { type: string, enum: [DOCTOR, PATIENT] }
        tajNumber: { type: string }
        address: { type: string }
        specialization: { type: string }

    UserAuthResponse:
      type: object
      properties:
        success: { type: boolean }
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        token: { type: string }

    UserProfileResponse:
      type: object
      properties:
        success: { type: boolean }
        user:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            email: { type: string }
            phone: { type: string }
            tajNumber: { type: string, nullable: true }
            address: { type: string, nullable: true }
            birthDate: { type: string }
            gender: { type: string }
            role: { type: string }
            specialization: { type: string, nullable: true }
        nextAppointment: { type: object, nullable: true }
        appointments: { type: array, items: { type: object } }
        records: { type: array, items: { type: object } }
        availabilities: { type: array, items: { type: object } }
        stats:
          type: object
          properties:
            totalVisits: { type: integer }
            activeAppointments: { type: integer }
            lastVisitDate: { type: string, format: date-time, nullable: true }
        token: { type: string }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        tajNumber: { type: string }
        birthDate: { type: string }
        gender: { type: string }
        specialization: { type: string }
        password: { type: string }

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }