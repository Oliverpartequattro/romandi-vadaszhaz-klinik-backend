paths:
  /api/users:
    get:
      summary: Összes felhasználó lekérése (Csak Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        403:
          description: Nincs admin jogosultságod

  /api/users/doctors:
    get:
      summary: Az összes orvos lekérése (Publikus)
      tags: [Users]
      responses:
        200:
          description: Orvosok listája (név, szakvizsga, email, telefon)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id: { type: string }
                    name: { type: string }
                    specialization: { type: string }
                    email: { type: string }
                    phone: { type: string }

  /api/users/patients:
    get:
      summary: Az összes páciens lekérése (Csak Orvos vagy Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Páciensek listája minden adattal
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        403:
          description: Csak orvosok vagy adminok férhetnek hozzá

  /api/users/register:
    post:
      summary: Új felhasználó regisztrálása
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: Felhasználó létrehozva
        400:
          description: Már létező email

  /api/users/login:
    post:
      summary: Bejelentkezés
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Sikeres bejelentkezés
        401:
          description: Érvénytelen adatok

  /api/users/logout:
    post:
      summary: Felhasználó kijelentkezése
      tags: [Users]
      responses:
        200:
          description: Sikeres kijelentkezés
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Sikeres kijelentkezés." }

  /api/users/profile:
    get:
      summary: Bejelentkezett felhasználó saját profilja (Rekordokkal)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profil adatok a páciens kórtörténetével együtt
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      records:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecordPopulated'
    put:
      summary: Saját profil frissítése
      description: Frissíti a bejelentkezett felhasználó adatait és új tokent generál.
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        200:
          description: Profil sikeresen frissítve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        404:
          description: Felhasználó nem található

  /api/users/{id}:
    delete:
      summary: Felhasználó törlése (Saját profil vagy Admin által)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Sikeres törlés
        403:
          description: Nincs jogosultság a művelethez

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        role: { type: string, enum: [ADMIN, DOCTOR, PATIENT] }
        specialization: { type: string }
        tajNumber: { type: string }
        address: { type: string }
        token: { type: string }
    
    UserRegister:
      type: object
      required: [name, email, password, phone]
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        role: { type: string, enum: [DOCTOR, PATIENT], default: PATIENT }
        specialization: { type: string }
        tajNumber: { type: string }
        address: { type: string }

    UserUpdate:
      type: object
      description: Csak azokat a mezőket küldd el, amiket módosítani akarsz.
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        address: { type: string }
        tajNumber: { type: string }

    # Speciális séma a profilban megjelenő, már "kibontott" rekordokhoz
    RecordPopulated:
      type: object
      properties:
        _id: { type: string }
        description: { type: string }
        doctor:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
            specialization: { type: string }
        service:
          type: object
          properties:
            _id: { type: string }
            name: { type: string }
        createdAt: { type: string, format: date-time }