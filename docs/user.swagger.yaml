paths:
  /api/users:
    get:
      summary: Összes felhasználó lekérése (Csak Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sikeres lekérdezés
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          description: Nincs admin jogosultságod
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/doctors:
    get:
      summary: Az összes orvos lekérése (Publikus)
      tags: [Users]
      responses:
        200:
          description: Orvosok listája
        500:
          $ref: '#/components/responses/ServerError'

  /api/users/patients:
    get:
      summary: Az összes páciens lekérése (Csak Orvos vagy Admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Páciensek listája minden adattal
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          description: Csak orvosok vagy adminok férhetnek hozzá

  /api/users/register:
    post:
      summary: Új felhasználó regisztrálása
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: Felhasználó létrehozva
        400:
          description: Már létező email vagy hiányzó adatok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/login:
    post:
      summary: Bejelentkezés
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: "paciens@gmail.com" }
                password: { type: string, example: "pwd123" }
      responses:
        200:
          description: Sikeres bejelentkezés
        401:
          description: Érvénytelen email vagy jelszó
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/profile:
    get:
      summary: Bejelentkezett felhasználó saját profilja (Rekordokkal)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profil adatok
        401:
          $ref: '#/components/responses/Unauthorized'
        404:
          $ref: '#/components/responses/NotFound'
    put:
      summary: Saját profil frissítése
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        200:
          description: Profil sikeresen frissítve
        400:
          description: Hibás beviteli adatok
        401:
          $ref: '#/components/responses/Unauthorized'

  /api/users/{id}:
    delete:
      summary: Felhasználó törlése
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "6989c26f47278217e6676824"
      responses:
        200:
          description: Sikeres törlés
        401:
          $ref: '#/components/responses/Unauthorized'
        403:
          description: Nincs jogosultság a törléshez (pl. más profilja)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Nincs érvényes token (Nincs bejelentkezve)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: A keresett elem nem található
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Belső szerverhiba
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  
  schemas:
    Error:
      type: object
      properties:
        message: { type: string, example: "Hiba történt." }
    User:
      type: object
      properties:
        _id: { type: string, example: "6989c26f47278217e6676824" }
        name: { type: string, example: "Páciens János" }
        email: { type: string, example: "janos@gmail.com" }
        phone: { type: string, example: "+36701112233" }
        role: { type: string, enum: [ADMIN, DOCTOR, PATIENT], example: "PATIENT" }
        specialization: { type: string, example: "Nincs (Páciens)" }
        tajNumber: { type: string, example: "123 456 789" }
        address: { type: string, example: "9022 Győr, Fő tér 1." }
        token: { type: string, example: "eyJhbGciOiJIUzI1Ni..." }
    
    UserRegister:
      type: object
      required: [name, email, password, phone]
      properties:
        name: { type: string, example: "Új Páciens" }
        email: { type: string, example: "ujpaciens@gmail.com" }
        password: { type: string, example: "pwd123" }
        phone: { type: string, example: "+36307778899" }
        role: { type: string, enum: [DOCTOR, PATIENT], default: PATIENT, example: "PATIENT" }
        specialization: { type: string, example: "" }
        tajNumber: { type: string, example: "987 654 321" }
        address: { type: string, example: "1051 Budapest, Petőfi u. 10." }

    UserUpdate:
      type: object
      example:
        name: "Páciens János (Frissített)"
        phone: "+36709998877"
        address: "9022 Győr, Új utca 5."
      properties:
        name: { type: string }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        address: { type: string }
        tajNumber: { type: string }

    RecordPopulated:
      type: object
      properties:
        _id: { type: string, example: "698b05f145069be97c382db6" }
        description: { type: string, example: "Általános kontroll, minden rendben." }
        doctor:
          type: object
          properties:
            _id: { type: string, example: "698a3e705cf74c640c1f4b1c" }
            name: { type: string, example: "Dr. Példa János" }
            specialization: { type: string, example: "Kardiológus" }
        service:
          type: object
          properties:
            _id: { type: string, example: "65c1234567890123456789ab" }
            name: { type: string, example: "Kardiológiai vizsgálat" }
        createdAt: { type: string, format: date-time, example: "2026-02-10T10:18:25.482Z" }