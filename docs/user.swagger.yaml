openapi: 3.0.0
info:
  title: Romándi Vadászház Klinik - Felhasználók API
  version: "1.1.0"
  description: |
    Felhasználókezelés, hitelesítés és jogosultságkezelés. 
    A rendszer három szerepkört támogat: `PATIENT` (alapértelmezett), `DOCTOR`, `ADMIN`.
tags:
  - name: Users
    description: Regisztráció, bejelentkezés és profil műveletek

paths:
  /api/users/register:
    post:
      tags: [Users]
      summary: Új felhasználó regisztrálása
      description: |
        Létrehoz egy új felhasználót. 
        - Páciens esetén kötelező: `tajNumber`, `address`.
        - Orvos esetén kötelező: `specialization`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Sikeres regisztráció.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'
        '400':
          description: Validációs hiba (pl. foglalt email, gyenge jelszó vagy érvénytelen telefonszám).

  /api/users/login:
    post:
      tags: [Users]
      summary: Bejelentkezés
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Sikeres bejelentkezés.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAuthResponse'
        '401':
          description: Érvénytelen hitelesítési adatok.

  /api/users/profile:
    get:
      tags: [Users]
      summary: Bejelentkezett felhasználó saját profilja
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Részletes profiladatok (pácienseknél leletekkel, orvosoknál rendelési idővel).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
    put:
      tags: [Users]
      summary: Saját profil frissítése
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil sikeresen frissítve.

  /api/users/doctors:
    get:
      tags: [Users]
      summary: Orvosok listájának lekérése
      description: Publikus lista az orvosokról, szakterületükről és rendelési idejükről.
      responses:
        '200':
          description: Orvosok listája.

  /api/users/forgot-password:
    post:
      tags: [Users]
      summary: Elfelejtett jelszó kód kérése
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
      responses:
        '200':
          description: A 6 jegyű kód kiküldve emailben.

  /api/users/reset-password:
    post:
      tags: [Users]
      summary: Jelszó visszaállítása kóddal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email: { type: string }
                code: { type: string, description: "6 jegyű kód" }
                newPassword: { type: string }
      responses:
        '200':
          description: Jelszó sikeresen megváltoztatva.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required: [name, email, password, phone, birthDate, gender]
      properties:
        name: { type: string, minLength: 3, maxLength: 50 }
        email: { type: string, format: email }
        password: { type: string, pattern: '^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{8,}$' }
        phone: { type: string, example: "+36301234567" }
        birthDate: { type: string, format: date }
        gender: { type: string, enum: [MALE, FEMALE] }
        role: { type: string, enum: [DOCTOR, PATIENT], default: PATIENT }
        tajNumber: { type: string, description: "Pácienseknél kötelező (9 számjegy)" }
        address: { type: string, description: "Pácienseknél kötelező (Irányítószám Város, Utca)" }
        specialization: { type: string, description: "Orvosoknál kötelező" }

    UserAuthResponse:
      type: object
      properties:
        success: { type: boolean }
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string }
        token: { type: string }

    UserProfileResponse:
      allOf:
        - $ref: '#/components/schemas/UserAuthResponse'
        - type: object
          properties:
            phone: { type: string }
            tajNumber: { type: string, nullable: true }
            address: { type: string, nullable: true }
            birthDate: { type: string, format: date }
            gender: { type: string }
            specialization: { type: string, nullable: true }
            records: { type: array, items: { type: object } }
            availabilities: { type: array, items: { type: object } }

    UserUpdate:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        address: { type: string }
        password: { type: string }
        specialization: { type: string }

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }